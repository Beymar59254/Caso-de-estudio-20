services:
  - type: web
    name: caso-estudio-20
    runtime: php
    rootDir: ./laravel-app
    buildCommand: |
      composer install --no-interaction --prefer-dist
      if [ -f package.json ]; then
        npm ci
        npm run build
      fi
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT

    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: SESSION_DRIVER
        value: file
      - key: DB_CONNECTION
        value: mysql

